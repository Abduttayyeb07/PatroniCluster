services:
  zigchain-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zigchain-bot
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - bot-logs:/app/logs
      - /root/.ssh/id_ed25519:/app/.ssh/id_ed25519:ro
    networks:
      - zigchain-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-logs:
    driver: local

networks:
  zigchain-net:
    driver: bridge
